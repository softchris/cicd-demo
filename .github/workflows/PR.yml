
name: PR

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (incl. pytest)
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          # If you have a requirements file, prefer this:
          # pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -q
